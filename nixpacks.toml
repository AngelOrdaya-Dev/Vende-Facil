[variables]
COMPOSER_ALLOW_SUPERUSER = "1"
NODE_ENV = "production"

[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.pdo",
  "php84Extensions.pdo_sqlite",
  "php84Extensions.sqlite3",
  "php84Extensions.mbstring",
  "php84Extensions.xml",
  "php84Extensions.curl",
  "php84Extensions.zip",
  "php84Extensions.gd",
  "php84Extensions.tokenizer",
  "php84Extensions.fileinfo",
  "php84Extensions.openssl",
  "nodejs_20",
  "nodePackages.npm"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci",
  "npm run build"
]

[phases.build]
cmds = [
  "mkdir -p database && touch database/database.sqlite"
]

[start]
cmd = "php artisan config:clear && php artisan route:clear && php artisan view:clear && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
